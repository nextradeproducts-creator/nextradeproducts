<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product - Omex Medical Technology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
</head>
<body>
  <div id="topBar"></div>
  <div id="siteHeader"></div>

  <section class="page-banner">
    <div class="container">
      <h1 id="productTitle">Product Detail</h1>
      <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><a href="product-category/urology.html" id="categoryLink">Products</a><span>/</span><span id="productName">Product</span></div>
    </div>
  </section>

  <section class="product-detail">
    <div class="container">
      <div class="product-detail-grid" id="productDetail"></div>
      <div class="related-products" id="relatedProducts">
        <h2>Related Products</h2>
        <div class="related-products-grid" id="relatedGrid"></div>
      </div>
    </div>
  </section>

  <div id="siteFooter"></div>
  <div id="whatsAppFloat"></div>
  <div id="enquirePopup"></div>

  <script src="js/components.js"></script>
  <script src="js/script.js"></script>
  <script src="js/products.js"></script>
  <script>
    document.getElementById('topBar').innerHTML = renderTopBar();
    document.getElementById('siteHeader').innerHTML = renderHeaderRoot('home');
    document.getElementById('siteFooter').innerHTML = renderFooterRoot();
    document.getElementById('whatsAppFloat').innerHTML = renderWhatsApp();
    document.getElementById('enquirePopup').innerHTML = renderEnquirePopup();

    // Get product ID from URL
    var params = new URLSearchParams(window.location.search);
    var productId = params.get('id');
    
    if (productId && typeof products !== 'undefined') {
      var product = null;
      for (var i = 0; i < products.length; i++) {
        if (products[i].id === productId) {
          product = products[i];
          break;
        }
      }
      
      if (product) {
        document.title = product.name + ' - Omex Medical Technology';
        document.getElementById('productTitle').textContent = product.name;
        document.getElementById('productName').textContent = product.name;
        
        var categoryNames = {
          'urology': 'Urology',
          'infusion-transfusion': 'Infusion & Transfusion',
          'gastroenterology': 'Gastroenterology',
          'anesthesia-care': 'Anesthesia Care',
          'surgery-wound-care': 'Surgery & Wound Care',
          'miscellaneous-range': 'Miscellaneous Range',
          'orthopedic-range': 'Orthopedic Range',
          'body-belt-braces': 'Body Belt & Braces'
        };
        var catName = categoryNames[product.category] || product.category;
        document.getElementById('categoryLink').textContent = catName;
        document.getElementById('categoryLink').href = 'product-category/' + product.category + '.html';
        
        // Features list
        var featuresHtml = '';
        product.features.forEach(function(f) {
          featuresHtml += '<li>' + f + '</li>';
        });
        
        // Detail content
        document.getElementById('productDetail').innerHTML = 
          '<div class="product-detail-image"><img src="' + product.image + '" alt="' + product.name + '" onerror="this.src=\'images/cert-iso-9001.svg\'"></div>' +
          '<div class="product-detail-info">' +
            '<h1>' + product.name + '</h1>' +
            '<div class="product-code">' + (product.code || '') + '</div>' +
            '<p class="product-desc">' + product.description + '</p>' +
            '<ul class="product-features">' + featuresHtml + '</ul>' +
            '<div class="product-actions">' +
              '<a href="contact-us.html" class="btn btn-primary">Enquire Now</a>' +
              '<button class="enquire-btn" onclick="document.getElementById(\'enquirePopup\').classList.add(\'show\');">Quick Enquiry</button>' +
            '</div>' +
          '</div>';
        
        // Related products
        if (product.related && product.related.length > 0) {
          var relatedGrid = document.getElementById('relatedGrid');
          product.related.forEach(function(relatedId) {
            var relatedProduct = null;
            for (var j = 0; j < products.length; j++) {
              if (products[j].id === relatedId) {
                relatedProduct = products[j];
                break;
              }
            }
            if (relatedProduct) {
              relatedGrid.innerHTML += 
                '<div class="product-card"><a href="product.html?id=' + relatedProduct.id + '"><img src="' + relatedProduct.image + '" alt="' + relatedProduct.name + '" onerror="this.src=\'images/cert-iso-9001.svg\'"></a><div class="product-card-body"><h3>' + relatedProduct.name + '</h3><div class="product-code">' + (relatedProduct.code || '') + '</div><a href="product.html?id=' + relatedProduct.id + '" class="btn btn-sm">Read More</a></div></div>';
            }
          });
        } else {
          document.getElementById('relatedProducts').style.display = 'none';
        }
      } else {
        document.getElementById('productDetail').innerHTML = '<div style="text-align:center;padding:60px 0;"><h2>Product not found</h2><p>The product you are looking for does not exist.</p><a href="index.html" class="btn btn-primary">Back to Home</a></div>';
        document.getElementById('relatedProducts').style.display = 'none';
      }
    } else {
      document.getElementById('productDetail').innerHTML = '<div style="text-align:center;padding:60px 0;"><h2>No product selected</h2><p>Please select a product from our categories.</p><a href="product-category/urology.html" class="btn btn-primary">Browse Products</a></div>';
      document.getElementById('relatedProducts').style.display = 'none';
    }
  </script>
</body>
</html>
